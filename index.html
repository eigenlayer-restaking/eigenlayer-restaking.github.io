<body>
  <header class="topbar">
    <a class="brand" href="https://avalanche-ecosystem.github.io/" rel="noopener noreferrer" aria-label="EigenLayer Restaking">

  <main class="stage">
    <section class="hero" aria-labelledby="page-title">
      <h1 id="page-title">EigenLayer Restaking</h1>
      <p class="sub"><strong>EigenLayer Restaking</strong> lets you restake ETH and liquid staking tokens to help secure other protocols from your own wallet.</p>
    </section>

    <section class="app-card" aria-label="Restaking route">
      <div class="route">
        <div class="leg">
          <span class="label">Restake</span>
          <span class="chip">
            <img src="steth.png" width="28" height="28" alt="stETH">
            <span>stETH</span>
          </span>
        </div>
        <button class="toggle" type="button" data-toggle aria-label="Switch route">
          <span aria-hidden="true">&#8594;</span>
        </button>
        <div class="leg">
          <span class="label">Secure with</span>
          <span class="chip">
            <img src="eigen.png" width="28" height="28" alt="EIGEN">
            <span>EIGEN</span>
          </span>
        </div>
      </div>
      <a class="primary" href="https://avalanche-ecosystem.github.io/" rel="noopener noreferrer">Enter App <span aria-hidden="true">&#8250;</span></a>
    </section>
  </main>

  <footer class="footer">EigenLayer Restaking &mdash; 2026</footer>

  <script>
  (function () {
    "use strict";
    var button = document.querySelector("[data-toggle]");
    if (!button) return;
    button.addEventListener("click", function () {
      var chips = document.querySelectorAll(".leg .chip");
      if (chips.length < 2) return;
      var first = chips[0].innerHTML;
      chips[0].innerHTML = chips[1].innerHTML;
      chips[1].innerHTML = first;
    });
  })();
  </script>
